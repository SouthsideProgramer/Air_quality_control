; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:yolo_uno]
platform = espressif32
board = yolo_uno
framework = arduino
monitor_speed = 115200
build_flags = 
	-DELEGANTOTA_USE_ASYNC_WEBSERVER=1
	-DSSID_AP='"ESP32 setup"'
	-DMY_SCL=11
	-DMY_SDA=12
	-DMY_LED=45
	-DMY_BOARD='"Yolo Uno"'
	-DIS_ROOT=1
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
lib_compat_mode = strict
lib_ldf_mode = chain
lib_deps = 
	https://github.com/RobTillaart/DHT20
	https://github.com/RobTillaart/PIR
	https://github.com/RobTillaart/I2C_LCD
	https://github.com/RobTillaart/RAIN
	https://github.com/fdebrabander/Arduino-LiquidCrystal-I2C-library
	adafruit/Adafruit NeoPixel@^1.15.1
	https://github.com/arduino-libraries/Arduino_JSON
	https://github.com/adafruit/Adafruit_BME280_Library
	ESP32Async/AsyncTCP @ 3.4.10
	ESP32Async/ESPAsyncWebServer @ 3.9.4
	https://github.com/ayushsharma82/ElegantOTA
	tanakamasayuki/TensorFlowLite_ESP32 @ ^1.0.0
	bblanchon/ArduinoJson@^7
	4-20ma/ModbusMaster@^2.0.1
	xreef/EByte LoRa E22 library@^1.0.9
	https://github.com/m5stack/TinyGPSPlus
	plerup/EspSoftwareSerial@^8.2.0
